name: QA Report
on:
  schedule:
    - cron: '0 9 1 * *'  # Wizard will customize cron schedule
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with: { sparse-checkout: 'config.json', sparse-checkout-cone-mode: false }
      - id: check
        run: '[ -f config.json ] && echo "should_run=true" >> "$GITHUB_OUTPUT" || echo "::notice::Template repo — skipping"'

  qa-report:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Run QA report
        run: npm run qa-report -- --html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/
          git diff --cached --quiet || git commit -m "qa: monthly report $(date +%Y%m)"
          git push
