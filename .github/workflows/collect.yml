name: Collect Data
on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC (14:00 Taiwan) for deadline-check
  workflow_dispatch:
    inputs:
      collector:
        description: 'Specific collector (empty = all)'
        required: false
      depth:
        description: 'Collection depth'
        required: false
        default: 'standard'
        type: choice
        options: [quick, standard, deep]
      target:
        description: 'Specific target (empty = all)'
        required: false
  repository_dispatch:
    types: []

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with: { sparse-checkout: 'config.json', sparse-checkout-cone-mode: false }
      - id: check
        run: '[ -f config.json ] && echo "should_run=true" >> "$GITHUB_OUTPUT" || echo "::notice::Template repo — skipping"'

  collect:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Clone targets
        run: bash scripts/clone-targets.sh
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_FILTER: ${{ inputs.target }}
      - name: Run collectors
        run: |
          if [ -n "${{ inputs.collector }}" ]; then
            COLLECT_DEPTH="${{ inputs.depth }}" bash collectors/${{ inputs.collector }}.sh
          else
            COLLECT_DEPTH="${{ inputs.depth || 'standard' }}" bash collectors/run-all.sh
          fi
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/collected/
          git diff --cached --quiet || git commit -m "data: collect $(date +%Y%m%d-%H%M%S)"
          git push
