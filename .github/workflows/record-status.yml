name: Record Status Update

on:
  pull_request:
    types: [closed]
    paths:
      - 'data/reported/*.json'

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Update record status
        run: |
          NEW_STATUS="rejected"
          if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            NEW_STATUS="approved"
          fi

          echo "PR #${{ github.event.pull_request.number }} $NEW_STATUS"

          # Find records that were added/modified in this PR
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha }} -- 'data/reported/*.json' 2>/dev/null || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No record files changed"
            exit 0
          fi

          UPDATED=0
          for f in $CHANGED_FILES; do
            [ ! -f "$f" ] && continue

            # Only update records with pending_review status
            CURRENT_STATUS=$(python3 -c "
          import json, sys
          with open(sys.argv[1]) as fh:
              data = json.load(fh)
          print(data.get('status', ''))
          " "$f" 2>/dev/null || true)

            if [ "$CURRENT_STATUS" != "pending_review" ]; then
              echo "  Skip $f (status: $CURRENT_STATUS)"
              continue
            fi

            # Update status and append audit trail
            python3 -c "
          import json, sys, datetime

          with open(sys.argv[1]) as fh:
              data = json.load(fh)

          data['status'] = sys.argv[2]
          data.setdefault('audit_trail', []).append({
              'action': sys.argv[2],
              'at': datetime.datetime.now(datetime.timezone.utc).isoformat(),
              'by': 'github-actions',
              'source': 'ci',
              'pr': '#${{ github.event.pull_request.number }}'
          })

          with open(sys.argv[1], 'w') as fh:
              json.dump(data, fh, indent=2, ensure_ascii=False)
          " "$f" "$NEW_STATUS"

            echo "  Updated: $f → $NEW_STATUS"
            UPDATED=$((UPDATED + 1))
          done

          echo "Updated $UPDATED records"

      - name: Commit status changes
        if: github.event.pull_request.merged == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reported/*.json
          git diff --cached --quiet || git commit -m "ci: update record status to approved (PR #${{ github.event.pull_request.number }})"
          git push
