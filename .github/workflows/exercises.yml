name: Exercises
on:
  schedule:
    - cron: '0 8 * * 1'  # Wizard will customize cron schedule
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Playbook to run (empty = all)'
        required: false
      target:
        description: 'Specific target (empty = all)'
        required: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with: { sparse-checkout: 'config.json', sparse-checkout-cone-mode: false }
      - id: check
        run: '[ -f config.json ] && echo "should_run=true" >> "$GITHUB_OUTPUT" || echo "::notice::Template repo — skipping"'

  exercises:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Run exercises
        run: |
          if [ -n "${{ inputs.playbook }}" ]; then
            bash scripts/monitor/exercises/${{ inputs.playbook }}.sh
          else
            bash scripts/monitor/exercises/run-all.sh
          fi
        env:
          EXERCISE_TARGET: ${{ inputs.target }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "exercises: weekly run $(date +%Y%m%d)"
          git push
