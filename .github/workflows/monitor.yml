name: Monitor
on:
  schedule:
    - cron: '0 6 * * *'  # Wizard will customize cron schedule
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with: { sparse-checkout: 'config.json', sparse-checkout-cone-mode: false }
      - id: check
        run: '[ -f config.json ] && echo "should_run=true" >> "$GITHUB_OUTPUT" || echo "::notice::Template repo — skipping"'

  monitor:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Heartbeat check
        run: bash scripts/monitor/heartbeat.sh
      - name: Posture check
        run: bash scripts/monitor/posture-check.sh
      - name: Monitor scan
        run: bash scripts/monitor/monitor-scan.sh
      - name: Check record retention
        run: bash scripts/monitor/check-retention.sh || true
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "monitor: daily scan $(date +%Y%m%d)"
          git push
