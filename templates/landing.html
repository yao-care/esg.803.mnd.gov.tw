<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__KB_NAME__</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-base, #f5f6f8);
      color: var(--text-primary, #1e2030);
    }
    .landing-container {
      text-align: center;
      max-width: 640px;
      padding: 3rem 1.5rem;
    }
    .landing-container h1 {
      font-size: var(--text-xl, 2rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .landing-container p {
      font-size: var(--text-base, 1.5rem);
      color: var(--text-secondary, #5e6070);
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .landing-container .hint {
      font-size: var(--text-sm, 1.25rem);
      color: var(--text-muted, #8a8c98);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="landing-container">
    <h1>__KB_NAME__</h1>
    <p>__KB_DESCRIPTION__</p>
    <p class="hint">知識體內容由嚮導初始化後產生。</p>

</html>
